    <!-- Blocking dark-mode script: runs before first paint to prevent flash -->
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        safelist: [
          'dark:bg-gray-900', 'dark:bg-gray-800', 'dark:bg-gray-700', 'dark:bg-gray-600',
          'dark:border-gray-700', 'dark:text-white', 'dark:text-gray-100', 'dark:text-gray-200',
          'dark:text-gray-400', 'dark:hover:bg-gray-600', 'dark:placeholder-gray-500',
          'dark:bg-gray-900\/60',
        ],
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Montserrat"', 'sans-serif'],
              display: ['"Montserrat"', 'sans-serif'],
            },
          },
        },
      }
    </script>
